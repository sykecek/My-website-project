<script>
    // Generic GIF handler: attach to every .universe-card that has an image with data-gif
    (function(){
      const cards = Array.from(document.querySelectorAll('.universe-card'));
      if (!cards.length) return;

      cards.forEach(card => {
        const img = card.querySelector('.universe-card-image img');
        if (!img) return;
        const gifSrc = img.dataset.gif;
        if (!gifSrc) return; // no gif for this card

        // ensure gif-bg exists
        let gifBg = card.querySelector('.gif-bg');
        if (!gifBg) {
          const wrap = card.querySelector('.universe-card-image');
          gifBg = document.createElement('div');
          gifBg.className = 'gif-bg';
          gifBg.setAttribute('aria-hidden','true');
          wrap.appendChild(gifBg);
        }

        let playing = false;
        let preloadImg = null;

        function preload(url){
          preloadImg = new Image();
          preloadImg.src = url;
        }

        function play(){
          const active = gifSrc + '?_=' + Date.now();
          preload(active);
          gifBg.style.backgroundImage = `url('${active}')`;
          card.classList.add('gif-playing');
          playing = true;
        }

        function stop(){
          card.classList.remove('gif-playing');
          playing = false;
          if (gifBg) gifBg.style.backgroundImage = '';
        }

        // events
        card.addEventListener('mouseenter', play);
        card.addEventListener('mouseleave', stop);

        const link = card.closest('a');
        if (link) {
          link.addEventListener('focus', play, true);
          link.addEventListener('blur', stop, true);
        }

        card.addEventListener('touchstart', function onTouch(e){
          if (!playing) {
            play();
            setTimeout(stop, 4000);
          }
        }, {passive: true});
      });

    })();
  </script>
