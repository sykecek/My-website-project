<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#040414"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff0c6"/>
      <stop offset="55%" stop-color="#e1c27d"/>
      <stop offset="100%" stop-color="#8a6b2f"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="clip">
      <circle cx="600" cy="410" r="230"/>
    </clipPath>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <!-- rings -->
    <ellipse cx="600" cy="450" rx="380" ry="150" fill="none" stroke="#d9d0b6" stroke-width="26" opacity="0.35"/>
    <ellipse cx="600" cy="450" rx="340" ry="130" fill="none" stroke="#f3ead2" stroke-width="16" opacity="0.28"/>
    <ellipse cx="600" cy="450" rx="300" ry="112" fill="none" stroke="#b7aa8a" stroke-width="10" opacity="0.22"/>

    <!-- planet body -->
    <circle cx="600" cy="410" r="230" fill="url(#planet)"/>
    <g clip-path="url(#clip)" opacity="0.45">
      <rect x="360" y="280" width="480" height="34" fill="#f3e2b2"/>
      <rect x="360" y="330" width="480" height="42" fill="#d5b16f"/>
      <rect x="360" y="390" width="480" height="30" fill="#f3e2b2"/>
      <rect x="360" y="435" width="480" height="44" fill="#cda35e"/>
      <rect x="360" y="495" width="480" height="34" fill="#f3e2b2"/>
    </g>
  </g>

  <text x="60" y="90" fill="#f6f6ff" font-family="system-ui,Segoe UI,Arial" font-size="42" letter-spacing="6">SATURN</text>
  <text x="60" y="135" fill="#a5a5c5" font-family="system-ui,Segoe UI,Arial" font-size="20">stylized illustration (SVG)</text>
</svg>
