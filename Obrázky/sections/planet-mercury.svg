<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#040414"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d5d5d5"/>
      <stop offset="55%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#5f5f5f"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="410" r="250" fill="url(#planet)"/>
    <!-- craters -->
    <g opacity="0.35" fill="#2b2b2b">
      <circle cx="520" cy="340" r="42"/>
      <circle cx="700" cy="470" r="58"/>
      <circle cx="660" cy="320" r="28"/>
      <circle cx="560" cy="510" r="24"/>
      <circle cx="770" cy="380" r="18"/>
    </g>
    <g opacity="0.25" fill="#ffffff">
      <circle cx="535" cy="355" r="18"/>
      <circle cx="723" cy="492" r="22"/>
      <circle cx="665" cy="330" r="12"/>
    </g>
  </g>

  <text x="60" y="90" fill="#f6f6ff" font-family="system-ui,Segoe UI,Arial" font-size="42" letter-spacing="6">MERCURY</text>
  <text x="60" y="135" fill="#a5a5c5" font-family="system-ui,Segoe UI,Arial" font-size="20">stylized illustration (SVG)</text>
</svg>
