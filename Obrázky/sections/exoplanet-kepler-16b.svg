<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#040414"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe5c2"/>
      <stop offset="55%" stop-color="#caa27a"/>
      <stop offset="100%" stop-color="#6a4b34"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0 0 0 0.9  0 1 0 0 0.7  0 0 1 0 0.2  0 0 0 1 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- two suns -->
  <g filter="url(#glow)" opacity="0.95">
    <circle cx="260" cy="220" r="70" fill="#ffd26a"/>
    <circle cx="360" cy="270" r="45" fill="#ffe3a8" opacity="0.85"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="690" cy="460" r="250" fill="url(#planet)"/>
    <g opacity="0.25" fill="#ffffff">
      <ellipse cx="640" cy="520" rx="140" ry="44"/>
      <ellipse cx="760" cy="410" rx="120" ry="36"/>
    </g>
  </g>

  <text x="60" y="90" fill="#f6f6ff" font-family="system-ui,Segoe UI,Arial" font-size="38" letter-spacing="4">KEPLER-16B</text>
  <text x="60" y="135" fill="#a5a5c5" font-family="system-ui,Segoe UI,Arial" font-size="20">circumbinary exoplanet (stylized SVG)</text>
</svg>
