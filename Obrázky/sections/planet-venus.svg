<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#040414"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe2a6"/>
      <stop offset="55%" stop-color="#e0b66e"/>
      <stop offset="100%" stop-color="#a67a3f"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="410" r="250" fill="url(#planet)"/>
    <!-- cloud bands -->
    <g opacity="0.28">
      <path d="M390 340 C480 300, 520 320, 610 300 C720 275, 820 320, 860 350 C780 390, 680 380, 600 400 C500 430, 430 410, 390 390 Z" fill="#fff2cc"/>
      <path d="M370 430 C470 390, 540 420, 620 400 C730 370, 830 420, 880 460 C780 520, 700 500, 610 520 C500 550, 420 520, 370 490 Z" fill="#fff2cc"/>
    </g>
  </g>

  <text x="60" y="90" fill="#f6f6ff" font-family="system-ui,Segoe UI,Arial" font-size="42" letter-spacing="6">VENUS</text>
  <text x="60" y="135" fill="#a5a5c5" font-family="system-ui,Segoe UI,Arial" font-size="20">stylized illustration (SVG)</text>
</svg>
