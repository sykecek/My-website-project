<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#040414"/>
    </radialGradient>
    <radialGradient id="ocean" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6dd6ff"/>
      <stop offset="55%" stop-color="#2b7cff"/>
      <stop offset="100%" stop-color="#0b2b73"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="410" r="250" fill="url(#ocean)"/>
    <!-- continents (stylized) -->
    <g fill="#3ddc84" opacity="0.9">
      <path d="M520 330 C560 300, 610 305, 640 340 C665 370, 650 400, 610 420 C560 445, 520 420, 510 390 C500 360, 500 345, 520 330 Z"/>
      <path d="M675 450 C720 430, 760 440, 780 470 C800 505, 775 540, 730 550 C690 558, 660 535, 655 505 C650 480, 655 465, 675 450 Z"/>
      <path d="M430 470 C470 455, 500 470, 510 500 C520 535, 495 565, 455 570 C420 573, 395 550, 392 520 C389 495, 405 480, 430 470 Z"/>
    </g>
    <!-- clouds -->
    <g fill="#ffffff" opacity="0.22">
      <ellipse cx="530" cy="450" rx="130" ry="40"/>
      <ellipse cx="720" cy="360" rx="110" ry="34"/>
      <ellipse cx="630" cy="520" rx="140" ry="44"/>
    </g>
  </g>

  <text x="60" y="90" fill="#f6f6ff" font-family="system-ui,Segoe UI,Arial" font-size="42" letter-spacing="6">EARTH</text>
  <text x="60" y="135" fill="#a5a5c5" font-family="system-ui,Segoe UI,Arial" font-size="20">stylized illustration (SVG)</text>
</svg>
